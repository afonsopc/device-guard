<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360">
<style>
  :root {
    --accent: #2D9F7F;
    --accent-hover: #34B892;
    --accent-subtle: rgba(45, 159, 127, 0.10);
    --accent-border: rgba(45, 159, 127, 0.25);
    --bg: #1A1A1E;
    --bg-raised: #222226;
    --bg-input: #2A2A2F;
    --bg-hover: #2E2E33;
    --text: #E8E6E3;
    --text-secondary: #9B9A97;
    --text-muted: #5C5B58;
    --border: rgba(255, 255, 255, 0.07);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 360px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
  }

  .brand-icon svg {
    width: 17px;
    height: 17px;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .brand-desc {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 1px;
  }

  /* ── Toggle ── */
  .toggle {
    appearance: none;
    width: 46px;
    height: 26px;
    background: var(--bg-input);
    border: none;
    border-radius: 13px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s ease;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  .toggle::before {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: #6B6B6F;
    border-radius: 50%;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .toggle:checked {
    background: var(--accent);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
  }

  .toggle:checked::before {
    transform: translateX(20px);
    background: #fff;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }

  /* ── Content ── */
  .content {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-raised);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    transition: opacity 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
  }

  .card:hover:not(.disabled) {
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
  }

  .card.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .card-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon svg {
    width: 16px;
    height: 16px;
  }

  #cameraCard .card-icon {
    background: rgba(96, 165, 250, 0.12);
    color: #60A5FA;
  }
  #micCard .card-icon {
    background: rgba(251, 146, 60, 0.12);
    color: #FB923C;
  }
  #speakerCard .card-icon {
    background: rgba(167, 139, 250, 0.12);
    color: #A78BFA;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .card-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* ── Form ── */
  .fields {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .input-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  select,
  input[type="text"] {
    width: 100%;
    height: 34px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: 12.5px;
    padding: 0 10px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    -webkit-appearance: none;
  }

  select {
    padding-right: 28px;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235C5B58' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    cursor: pointer;
  }

  select:focus,
  input[type="text"]:focus {
    border-color: var(--accent-border);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }

  input[type="text"]::placeholder {
    color: var(--text-muted);
  }

  select option {
    background: var(--bg-raised);
    color: var(--text);
  }

  /* ── Randomize ── */
  .randomize-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    width: 100%;
    padding: 9px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: var(--shadow);
  }

  .randomize-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    color: var(--text);
    border-color: rgba(255,255,255,0.12);
  }

  .randomize-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  .randomize-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ── Grant Link ── */
  .grant-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px;
    background: rgba(251, 191, 36, 0.06);
    border: 1px solid rgba(251, 191, 36, 0.15);
    border-radius: 8px;
    color: #FBBF24;
    font-size: 11.5px;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .grant-link:hover {
    background: rgba(251, 191, 36, 0.1);
    border-color: rgba(251, 191, 36, 0.25);
  }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.15);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }

  .status-text {
    font-family: 'Menlo', 'Consolas', 'Liberation Mono', monospace;
    font-size: 10.5px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    transition: color 0.2s ease;
  }

  .status-text.active {
    color: var(--accent);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .empty-option { color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Device Guard</div>
      <div class="brand-desc">Device fingerprint protection</div>
    </div>
  </div>
  <input type="checkbox" class="toggle" id="masterToggle">
</div>

<div class="divider"></div>

<div class="content">

  <div class="card disabled" id="cameraCard">
    <div class="card-label">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-title">Camera</div>
        <div class="card-subtitle">Video input device</div>
      </div>
    </div>
    <div class="fields">
      <div class="field-row">
        <label class="input-label">Device</label>
        <select id="cameraSelect">
          <option value="0" class="empty-option">No cameras found</option>
        </select>
      </div>
      <div class="field-row">
        <label class="input-label">Display as</label>
        <input type="text" id="cameraName" placeholder="Spoofed name...">
      </div>
    </div>
  </div>

  <div class="card disabled" id="micCard">
    <div class="card-label">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-title">Microphone</div>
        <div class="card-subtitle">Audio input device</div>
      </div>
    </div>
    <div class="fields">
      <div class="field-row">
        <label class="input-label">Device</label>
        <select id="micSelect">
          <option value="0" class="empty-option">No microphones found</option>
        </select>
      </div>
      <div class="field-row">
        <label class="input-label">Display as</label>
        <input type="text" id="micName" placeholder="Spoofed name...">
      </div>
    </div>
  </div>

  <div class="card disabled" id="speakerCard">
    <div class="card-label">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </div>
      <div class="card-info">
        <div class="card-title">Speaker</div>
        <div class="card-subtitle">Audio output device</div>
      </div>
    </div>
    <div class="fields">
      <div class="field-row">
        <label class="input-label">Device</label>
        <select id="speakerSelect">
          <option value="0" class="empty-option">No speakers found</option>
        </select>
      </div>
      <div class="field-row">
        <label class="input-label">Display as</label>
        <input type="text" id="speakerName" placeholder="Spoofed name...">
      </div>
    </div>
  </div>

  <button id="randomizeBtn" class="randomize-btn" disabled>
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
      <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
      <line x1="4" y1="4" x2="9" y2="9"/>
    </svg>
    Randomize names
  </button>

  <a href="#" id="grantAccess" class="grant-link" style="display:none">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    Grant access to detect device names
  </a>

</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Disabled</span>
</div>

<script src="popup.js"></script>

</body>
</html>
