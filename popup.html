<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=360">
<style>
  :root {
    --accent: #2D9F7F;
    --accent-hover: #34B892;
    --accent-subtle: rgba(45, 159, 127, 0.10);
    --accent-border: rgba(45, 159, 127, 0.25);
    --bg: #1A1A1E;
    --bg-raised: #222226;
    --bg-input: #2A2A2F;
    --bg-hover: #2E2E33;
    --text: #E8E6E3;
    --text-secondary: #9B9A97;
    --text-muted: #5C5B58;
    --border: rgba(255, 255, 255, 0.07);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
    --shadow-lg: 0 4px 12px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 360px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--accent);
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--shadow);
  }

  .brand-icon svg {
    width: 17px;
    height: 17px;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .brand-desc {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 1px;
  }

  /* ── Toggle ── */
  .toggle {
    appearance: none;
    width: 46px;
    height: 26px;
    background: var(--bg-input);
    border: none;
    border-radius: 13px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s ease;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  .toggle::before {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    background: #6B6B6F;
    border-radius: 50%;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .toggle:checked {
    background: var(--accent);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.15);
  }

  .toggle:checked::before {
    transform: translateX(20px);
    background: #fff;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }

  /* ── Content ── */
  .content {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-raised);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
    transition: opacity 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
  }

  .card:hover:not(.disabled) {
    box-shadow: var(--shadow-lg);
    transform: translateY(-1px);
  }

  .card.disabled {
    opacity: 0.35;
    pointer-events: none;
  }

  .card-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon svg {
    width: 16px;
    height: 16px;
  }

  #cameraCard .card-icon {
    background: rgba(96, 165, 250, 0.12);
    color: #60A5FA;
  }
  #micCard .card-icon {
    background: rgba(251, 146, 60, 0.12);
    color: #FB923C;
  }
  #speakerCard .card-icon {
    background: rgba(167, 139, 250, 0.12);
    color: #A78BFA;
  }

  /* ── Form ── */
  input[type="text"] {
    width: 100%;
    height: 34px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: inherit;
    font-size: 12.5px;
    padding: 0 10px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    -webkit-appearance: none;
    flex: 1;
    min-width: 0;
  }

  input[type="text"]:focus {
    border-color: var(--accent-border);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }

  input[type="text"]::placeholder {
    color: var(--text-muted);
  }

  /* ── Button Group ── */
  .btn-group {
    display: flex;
    box-shadow: var(--shadow);
    border-radius: 8px;
  }

  .btn-group .randomize-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 9px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 8px 0 0 8px;
    border-right: none;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: none;
  }

  .btn-group .edit-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 9px 14px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 0 8px 8px 0;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    box-shadow: none;
    white-space: nowrap;
  }

  .btn-group .randomize-btn:hover:not(:disabled),
  .btn-group .edit-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    color: var(--text);
    border-color: rgba(255,255,255,0.12);
  }

  .btn-group .randomize-btn:active:not(:disabled),
  .btn-group .edit-btn:active:not(:disabled) {
    transform: scale(0.98);
  }

  .btn-group .randomize-btn:disabled,
  .btn-group .edit-btn:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* ── Edit Page ── */
  .page { display: flex; flex-direction: column; min-height: 0; }
  .page-main { display: block; }
  .page-edit { display: none; }
  body.show-edit .page-main { display: none; }
  body.show-edit .page-edit { display: block; }

  .edit-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 20px 14px;
  }

  .back-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .back-btn:hover {
    background: var(--bg-hover);
    color: var(--text);
  }

  .edit-header-title {
    font-size: 14px;
    font-weight: 600;
  }

  .edit-content {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .name-section {
    background: var(--bg-raised);
    border-radius: 10px;
    padding: 12px 14px;
    box-shadow: var(--shadow);
  }

  .name-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .name-section-title {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .add-name-btn {
    display: flex;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: background 0.15s ease;
  }

  .add-name-btn:hover {
    background: var(--accent-subtle);
  }

  .name-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 130px;
    overflow-y: auto;
  }

  .name-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    background: var(--bg-input);
    border-radius: 6px;
    font-size: 12px;
    color: var(--text);
  }

  .name-item span {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .name-item .remove-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 4px;
    flex-shrink: 0;
    transition: all 0.15s ease;
  }

  .name-item .remove-btn:hover {
    background: rgba(248, 113, 113, 0.15);
    color: #F87171;
  }

  .name-input-row {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  .name-input-row input {
    flex: 1;
    height: 30px;
    font-size: 12px;
  }

  .name-input-row .confirm-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: var(--accent);
    border: none;
    border-radius: 7px;
    color: white;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }

  .name-input-row .confirm-add-btn:hover {
    background: var(--accent-hover);
  }

  .name-input-row { display: none; }
  .name-section.adding .name-input-row { display: flex; }
  .name-section.adding .add-name-btn { display: none; }

  /* ── Status Bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.15);
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-subtle);
  }

  .status-text {
    font-family: 'Menlo', 'Consolas', 'Liberation Mono', monospace;
    font-size: 10.5px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
    transition: color 0.2s ease;
  }

  .status-text.active {
    color: var(--accent);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<div class="page page-main">

<div class="header">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Device Guard</div>
      <div class="brand-desc">Device fingerprint protection</div>
    </div>
  </div>
  <input type="checkbox" class="toggle" id="masterToggle">
</div>

<div class="divider"></div>

<div class="content">

  <div class="card disabled" id="cameraCard">
    <div class="card-row">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
        </svg>
      </div>
      <input type="text" id="cameraName" placeholder="Camera name...">
    </div>
  </div>

  <div class="card disabled" id="micCard">
    <div class="card-row">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <input type="text" id="micName" placeholder="Microphone name...">
    </div>
  </div>

  <div class="card disabled" id="speakerCard">
    <div class="card-row">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </div>
      <input type="text" id="speakerName" placeholder="Speaker name...">
    </div>
  </div>

  <div class="btn-group">
    <button id="randomizeBtn" class="randomize-btn" disabled>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        <line x1="4" y1="4" x2="9" y2="9"/>
      </svg>
      Randomize
    </button>
    <button id="editBtn" class="edit-btn" disabled>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit
    </button>
  </div>

</div>

<div class="status-bar" id="statusBarMain">
  <div class="status-dot" id="statusDot"></div>
  <span class="status-text" id="statusText">Disabled</span>
</div>

</div><!-- end page-main -->

<div class="page page-edit">

<div class="edit-header">
  <button class="back-btn" id="backBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>
  <div class="edit-header-title">Edit Random Names</div>
</div>

<div class="divider"></div>

<div class="edit-content">

  <div class="name-section" id="editCameras">
    <div class="name-section-header">
      <span class="name-section-title">Cameras</span>
      <button class="add-name-btn" data-category="cameras">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add
      </button>
    </div>
    <div class="name-list" data-category="cameras"></div>
    <div class="name-input-row">
      <input type="text" placeholder="Name or multiple § separated...">
      <button class="confirm-add-btn" data-category="cameras">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="name-section" id="editMics">
    <div class="name-section-header">
      <span class="name-section-title">Microphones</span>
      <button class="add-name-btn" data-category="mics">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add
      </button>
    </div>
    <div class="name-list" data-category="mics"></div>
    <div class="name-input-row">
      <input type="text" placeholder="Name or multiple § separated...">
      <button class="confirm-add-btn" data-category="mics">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="name-section" id="editSpeakers">
    <div class="name-section-header">
      <span class="name-section-title">Speakers</span>
      <button class="add-name-btn" data-category="speakers">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add
      </button>
    </div>
    <div class="name-list" data-category="speakers"></div>
    <div class="name-input-row">
      <input type="text" placeholder="Name or multiple § separated...">
      <button class="confirm-add-btn" data-category="speakers">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
    </div>
  </div>

</div>
</div><!-- end page-edit -->

<script src="popup.js"></script>

</body>
</html>
